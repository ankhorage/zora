name: Capture native peer lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/fix-required-native-peer-contract'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-required-native-peer-contract
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Capture lint
        run: bun run lint > zora-lint.log 2>&1 || true

      - name: Upload lint output
        uses: actions/upload-artifact@v4
        with:
          name: zora-native-peer-lint
          path: zora-lint.log
          if-no-files-found: error
          retention-days: 1
