name: Format native peer test

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  format:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/fix-required-native-peer-contract'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-required-native-peer-contract
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply repository fixers
        run: |
          bun run lint:fix
          bun run format

      - name: Commit formatted test
        run: |
          rm .github/workflows/format-native-peer-test.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/nativePeerContract.test.ts .github/workflows/format-native-peer-test.yml
          git commit -m "Format native peer contract test"
          git push origin HEAD:agent/fix-required-native-peer-contract
