name: Apply native peer contract fix

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.ref == 'agent/fix-required-native-peer-contract'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-required-native-peer-contract
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Make root native peers required
        run: |
          cat > /tmp/update-package.mjs <<'EOF'
          const packagePath = 'package.json';
          const packageJson = await Bun.file(packagePath).json();
          delete packageJson.peerDependenciesMeta['@react-native-picker/picker'];
          delete packageJson.peerDependenciesMeta['expo-linear-gradient'];
          await Bun.write(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          EOF
          bun /tmp/update-package.mjs
          bun install --no-frozen-lockfile

      - name: Commit package contract and lockfile
        run: |
          rm .github/workflows/apply-native-peer-contract.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json bun.lock .github/workflows/apply-native-peer-contract.yml
          git commit -m "Make root native peers required"
          git push origin HEAD:agent/fix-required-native-peer-contract
